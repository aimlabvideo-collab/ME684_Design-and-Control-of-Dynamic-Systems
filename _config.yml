title: ME 684 — Design and Control of Dynamic Systems
description: California State University, Northridge — ME 684 course page
remote_theme: just-the-docs/just-the-docs

# GitHub Pages site address (repo name: ME684_Design-and-Control-of-Dynamic-Systems)
url: https://aimlabvideo-collab.github.io
baseurl: /ME684_Design-and-Control-of-Dynamic-Systems

# Enable the top search bar
search_enabled: true

# Top-right auxiliary link
aux_links:
  "GitHub":
    - "https://github.com/aimlabvideo-collab/ME684_Design-and-Control-of-Dynamic-Systems"

aux_links_new_tab: true

# Footer text
footer_content: "ME 684 · California State University, Northridge · Maintained by the instructor."

plugins:
  - jekyll-remote-theme

# Markdown settings tuned for MathJax (loaded in _includes/head_custom.html):
#  - math_engine: null  -> leave math for MathJax; without it kramdown wraps
#    $$...$$ in <script type="math/tex"> tags that MathJax 3 does not scan.
#  - input: GFM         -> do NOT treat intra-word underscores as italics, so
#    inline math like $x_{1,0}$ or $\omega_n^2$ is not mangled into <em> tags.
#  - hard_wrap: false   -> keep single newlines as spaces (GFM default would
#    insert a <br> at every line break and break paragraph flow).
kramdown:
  input: GFM
  hard_wrap: false
  math_engine: null
