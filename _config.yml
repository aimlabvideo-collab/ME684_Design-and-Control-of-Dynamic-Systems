title: ME 684 — Design and Control of Dynamic Systems
description: California State University, Northridge — ME 684 course page
remote_theme: just-the-docs/just-the-docs

# GitHub Pages site address (repo name: ME684_Design-and-Control-of-Dynamic-Systems)
url: https://aimlabvideo-collab.github.io
baseurl: /ME684_Design-and-Control-of-Dynamic-Systems

# Enable the top search bar
search_enabled: true

# Top-right auxiliary link
aux_links:
  "GitHub":
    - "https://github.com/aimlabvideo-collab/ME684_Design-and-Control-of-Dynamic-Systems"

aux_links_new_tab: true

# Footer text
footer_content: "ME 684 · California State University, Northridge · Maintained by the instructor."

plugins:
  - jekyll-remote-theme

# Let MathJax (loaded in _includes/head_custom.html) render all math.
# math_engine: null tells kramdown to parse $$...$$ as math but emit plain
# \(...\) (inline) / \[...\] (display) delimiters instead of <script type=
# "math/tex"> tags, which MathJax 3 does not scan. Because kramdown's math
# parser consumes the delimited content, underscores inside math (e.g.
# $$x_{1,0}$$, $$\omega_n^2$$) are NOT misread as <em> emphasis.
# NOTE: write ALL math with double-dollar $$...$$ delimiters (both inline and
# display) so the math parser — not the emphasis parser — handles it.
kramdown:
  math_engine: null
